spring:
  profiles:
    default: dev

  # Этап 7.1 (P0): чтобы 404/ресурсы попадали в @ControllerAdvice, а не в Whitelabel
  mvc:
    throw-exception-if-no-handler-found: true

  application:
    name: sem3

  flyway:
    enabled: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  perenual:
    apiKey: ${PERENUAL_API_KEY:}

  plantnet:
    apiKey: ${PLANTNET_API_KEY:}
    project: ${PLANTNET_PROJECT:all}
    baseUrl: ${PLANTNET_BASE_URL:https://my-api.plantnet.org}
    lang: ${PLANTNET_LANG:en}
    nbResults: ${PLANTNET_NB_RESULTS:7}

  storage:
    baseDir: ${APP_STORAGE_DIR:./data}

server:
  error:
    whitelabel:
      enabled: false
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false