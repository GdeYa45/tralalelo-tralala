<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base :: layout('Вход', '', ~{::main})}">

<main class="container">
    <h1>Вход</h1>
    <p class="muted">Введите логин и пароль.</p>

    <div class="alert error" th:if="${param.error != null}">
        Неверные данные для входа
    </div>

    <form method="post" th:action="@{/auth/login}" class="card" style="padding:14px; margin-top:12px; max-width:520px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <label class="field">
            <span class="field__label">Email</span>
            <input class="input" type="text" name="username" placeholder="email@example.com" required>
        </label>

        <label class="field" style="margin-top:12px;">
            <span class="field__label">Пароль</span>
            <input class="input" type="password" name="password" required>
        </label>

        <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn primary" type="submit">Войти</button>
            <a class="btn" th:href="@{/auth/register}">Регистрация</a>
        </div>
    </form>
</main>
</html>
