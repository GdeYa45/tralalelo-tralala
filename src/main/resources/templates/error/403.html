<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base :: layout('403 — Доступ запрещён', '', ~{::main})}">

<main class="container">
    <h1>403 — Доступ запрещён</h1>
    <p class="muted">
        Нет прав для просмотра этой страницы:
        <span th:text="${path}">/</span>
    </p>

    <div class="card" style="max-width:720px;">
        <p class="muted" style="margin-top:0;">
            Если кажется, что это ошибка — нужно войти под другой ролью или обратиться к администратору.
        </p>

        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;">
            <a class="btn btn-primary" th:href="@{/}">На главную</a>
            <a class="btn" th:href="${backUrl}">Назад</a>
        </div>
    </div>
</main>

</html>
