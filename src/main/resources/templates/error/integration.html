<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base :: layout(${title}, '', ~{::main})}">

<main class="container">
    <div class="card" style="max-width: 860px;">
        <h1 th:text="${title}">Ошибка внешнего сервиса</h1>

        <div class="alert error">
            <div style="font-weight:700; margin-bottom:6px;">
                Код: <span th:text="${code}">INTEGRATION_ERROR</span>
            </div>
            <div th:text="${message}">
                Внешний сервис временно недоступен. Попробовать позже.
            </div>

            <div class="muted" th:if="${details != null}" style="margin-top:10px; white-space: pre-wrap;">
                <span th:text="${details}">details</span>
            </div>
        </div>

        <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
            <a class="btn btn-primary" th:href="${backUrl}">Назад</a>
            <a class="btn btn-ghost" th:href="@{/}">На главную</a>
        </div>
    </div>
</main>
</html>
