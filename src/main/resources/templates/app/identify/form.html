<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base :: layout('Распознать растение', '', ~{::main})}">

<main class="container">
    <h1>Распознать растение</h1>
    <p class="muted">Загрузи фото — будет выполнено распознавание.</p>

    <div class="alert ok" th:if="${msg != null}" th:text="${msg}">ok</div>

    <div class="alert error" th:if="${error != null}">
        <strong>Ошибка:</strong> <span th:text="${error}"></span>
    </div>

    <form method="post" enctype="multipart/form-data" th:action="@{/app/identify}"
          th:object="${form}" class="card" style="padding:14px; margin-top:12px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div th:replace="~{fragments/components :: formErrors}"></div>

        <label class="field">
            <span class="field__label">Фото</span>
            <input class="input" type="file" th:field="*{photo}" accept="image/*" required>
            <div class="error-text" th:if="${#fields.hasErrors('photo')}" th:errors="*{photo}">err</div>
        </label>

        <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn primary" type="submit">Распознать</button>
            <a class="btn" th:href="@{/app/identify/history}">История</a>
        </div>
    </form>
</main>
</html>
