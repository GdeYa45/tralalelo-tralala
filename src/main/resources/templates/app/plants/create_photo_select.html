<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base :: layout('Выбор кандидата', '', ~{::main})}">

<main class="container">
    <h1 style="margin-top:0;">Добавить растение по фото</h1>

    <div style="display:flex; gap:10px; flex-wrap:wrap; margin:10px 0 14px;">
        <a class="btn" th:href="@{/app/plants/new}">Вручную</a>
        <a class="btn btn-primary" th:href="@{/app/plants/new/photo}">По фото</a>
    </div>

    <div th:if="${importError}" class="alert error" style="margin-bottom:12px;">
        <strong>Не получилось создать растение:</strong> <span th:text="${importError}"></span>
    </div>

    <div class="card" style="padding:14px;">
        <div class="muted">Фото:</div>
        <div style="margin-top:10px;">
            <img th:src="@{/app/identify/{id}/photo(id=${item.id})}"
                 style="max-width:360px; border-radius:12px;">
        </div>
    </div>

    <form method="post"
          th:action="@{/app/plants/new/photo/{id}/create(id=${item.id})}"
          th:object="${plantForm}"
          class="card" style="padding:14px; margin-top:14px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div th:replace="~{fragments/components :: formErrors}"></div>

        <h2 style="margin-top:0;">Кандидаты</h2>

        <div class="error-text" th:if="${#fields.hasErrors('selectedScientificName')}"
             th:errors="*{selectedScientificName}">err</div>

        <div class="card" style="padding:12px; margin-top:10px;" th:each="c : ${item.candidates}">
            <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                <input type="radio"
                       th:field="*{selectedScientificName}"
                       th:value="${c.scientificName}"
                       required>
                <div>
                    <div style="font-weight:700" th:text="${c.commonNames} ?: '—'">Common</div>
                    <div class="muted" th:text="${c.scientificName}">Latin</div>
                    <div class="muted"
                         th:text="${T(java.lang.String).format('%.0f%%', c.score * 100)}">0%</div>
                </div>
            </label>
        </div>

        <div id="perenualPreviewWrap" class="card" style="padding:14px; margin-top:14px; display:none;">
            <div class="muted" style="font-weight:700;">Превью вида (Perenual)</div>

            <div id="perenualPreviewStatus" class="muted" style="margin-top:8px;"></div>
            <div id="perenualPreviewError" class="alert error" style="display:none; margin-top:10px;"></div>

            <div id="perenualPreviewCard" style="margin-top:10px;"></div>
        </div>

        <input type="hidden" id="csrfToken" th:value="${_csrf.token}"/>
        <input type="hidden" id="csrfHeader" th:value="${_csrf.headerName}"/>

        <script th:src="@{/js/create-photo-perenual-preview.js}"></script>

        <h2 style="margin-top:18px;">Данные растения</h2>

        <div class="form-row">
            <label for="nickname">Название (кличка)</label>
            <input id="nickname" th:field="*{nickname}" placeholder="например: Фикус у окна"/>
            <div class="error-text" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}">err</div>
        </div>

        <div class="form-row">
            <label for="room">Комната (необязательно)</label>
            <select id="room" th:field="*{room}"
                    style="width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border); background:rgba(229,231,224,0.04); color:var(--text);">
                <option value="">— не выбрано —</option>
                <option th:each="o : ${roomOptions}" th:value="${o.id}" th:text="${o.label}">room</option>
            </select>
        </div>

        <div class="form-row">
            <label for="purchaseDate">Дата покупки (необязательно)</label>
            <input id="purchaseDate" type="date" th:field="*{purchaseDate}"/>
            <div class="error-text" th:if="${#fields.hasErrors('purchaseDate')}" th:errors="*{purchaseDate}">err</div>
        </div>

        <div class="form-row">
            <label for="notes">Заметки (необязательно)</label>
            <textarea id="notes" th:field="*{notes}" rows="4"
                      style="width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border); background:rgba(229,231,224,0.04); color:var(--text);"></textarea>
            <div class="error-text" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}">err</div>
        </div>

        <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
            <button class="primary" type="submit">Создать растение</button>
            <a class="btn btn-ghost" th:href="@{/app/plants/new/photo}">Загрузить другое фото</a>
        </div>

        <div class="muted" style="margin-top:10px;">
            После выбора кандидата вид подтянется через Perenual, затем создастся растение и задачи ухода.
        </div>
    </form>
</main>
</html>
