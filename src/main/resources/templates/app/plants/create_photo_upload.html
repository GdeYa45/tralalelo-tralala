<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base :: layout('Добавить растение по фото', '', ~{::main})}">

<main class="container">
    <h1 style="margin-top:0;">Добавить растение</h1>

    <div style="display:flex; gap:10px; flex-wrap:wrap; margin:10px 0 14px;">
        <a class="btn" th:href="@{/app/plants/new}">Вручную</a>
        <span class="btn btn-primary">По фото</span>
    </div>

    <form method="post" enctype="multipart/form-data"
          th:action="@{/app/plants/new/photo}" th:object="${form}"
          class="card" style="padding:14px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div th:replace="~{fragments/components :: formErrors}"></div>

        <div class="form-row">
            <label for="photo">Фото</label>
            <input id="photo" type="file" th:field="*{photo}" accept="image/*" required>
            <div class="error-text" th:if="${#fields.hasErrors('photo')}" th:errors="*{photo}">err</div>
        </div>

        <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
            <button class="primary" type="submit">Загрузить и распознать</button>
            <a class="btn btn-ghost" th:href="@{/app/plants}">Отмена</a>
        </div>
    </form>
</main>
</html>
