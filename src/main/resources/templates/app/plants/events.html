<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base :: layout('Журнал ухода', '', ~{::main})}">

<main class="container">
    <h1 style="margin-top:0;">Журнал ухода</h1>

    <div class="alert ok" th:if="${msg != null}" th:text="${msg}">ok</div>

    <div class="card" style="padding:14px;">
        <h2 style="margin-top:0;">Добавить событие: полив</h2>

        <form method="post" th:action="@{/app/plants/{id}/events/water(id=${plantId})}" th:object="${form}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div th:replace="~{fragments/components :: formErrors}"></div>

            <div class="form-row">
                <label for="comment">Комментарий (необязательно)</label>
                <textarea id="comment" th:field="*{comment}" rows="3"
                          style="width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border); background:rgba(229,231,224,0.04); color:var(--text);"></textarea>
                <div class="error-text" th:if="${#fields.hasErrors('comment')}" th:errors="*{comment}">err</div>
            </div>

            <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
                <button class="primary" type="submit">Отметить полив</button>
                <a class="btn" th:href="@{/app/plants/{id}(id=${plantId})}">Назад к растению</a>
            </div>
        </form>
    </div>

    <div class="card" style="padding:14px; margin-top:14px;">
        <h2 style="margin-top:0;">События</h2>

        <div th:if="${events == null || #lists.isEmpty(events)}" class="muted">
            Пока нет событий ухода.
        </div>

        <div th:if="${events != null && !#lists.isEmpty(events)}">
            <div th:each="e : ${events}" class="card" style="padding:12px; margin-top:10px;">
                <div style="display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;">
                    <div style="font-weight:700;" th:text="${e.type}">WATER</div>
                    <div class="muted" th:text="${#temporals.format(e.eventTime, 'dd.MM.yyyy HH:mm')}">time</div>
                </div>
                <div th:if="${e.comment}" class="muted" style="margin-top:6px;" th:text="${e.comment}">comment</div>
            </div>
        </div>
    </div>

</main>
</html>
