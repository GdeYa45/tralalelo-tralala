<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base :: layout('Удалить растение', '', ~{::main})}">

<main class="container">
    <h1 style="margin-top:0;">Удалить растение</h1>
    <div class="muted">Подтверждение удаления.</div>

    <div class="card" style="padding:14px;">
        <div style="font-weight:700;" th:text="${p.nickname}">nickname</div>
        <div class="muted" th:if="${p.speciesName}" th:text="${p.speciesName}">species</div>

        <div class="alert error" style="margin-top:12px;">
            Действие необратимо: растение будет удалено вместе со связанными задачами/событиями/фото.
        </div>

        <form method="post" th:action="@{/app/plants/{id}/delete(id=${p.id})}" style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="primary" type="submit">Удалить</button>
            <a class="btn" th:href="@{/app/plants/{id}(id=${p.id})}">Отмена</a>
            <a class="btn btn-ghost" th:href="@{/app/plants}">К списку</a>
        </form>
    </div>

</main>
</html>
