<header class="nav"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
        th:fragment="header">

    <div>
        <a th:href="@{/}">Главная</a>

        <a th:href="@{/app/species}">Каталог видов</a>

        <span sec:authorize="isAuthenticated()">
            <a th:href="@{/app}">Личный кабинет</a>
            <a th:href="@{/app/plants}">Мои растения</a>
            <a th:href="@{/app/today}">Сегодня нужно</a>
            <a th:href="@{/app/identify/ajax}">Распознавание (AJAX)</a>
        </span>

        <span sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin}">Админ</a>
        </span>
    </div>

    <div>
        <span sec:authorize="isAnonymous()">
            <a class="btn btn-ghost btn-inline" th:href="@{/auth/login}">Вход</a>
            <a class="btn btn-primary btn-inline" th:href="@{/auth/register}">Регистрация</a>
        </span>

        <span sec:authorize="isAuthenticated()">
            <span class="badge" th:text="${#authentication.name}">user</span>
            <form th:action="@{/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-ghost btn-inline" type="submit">Выйти</button>
            </form>
        </span>
    </div>

</header>
